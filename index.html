<script>
  let count = 0;

  let lastX = 0, lastY = 0, lastZ = 0;
  let calibrated = false;

  let lastJumpTime = 0;
  const COOLDOWN = 700; // ⏱ cambiado a 0.70s

  // 📊 buffer para suavizar ruido
  let buffer = [];
  const BUFFER_SIZE = 5;

  // 🎚 sensibilidad (controlable)
  let threshold = 25;

  const counterEl = document.getElementById("counter");

  function updateCounter() {
    counterEl.textContent = count;
  }

  // 🎚 crear slider de sensibilidad dinámico
  const slider = document.createElement("input");
  slider.type = "range";
  slider.min = 10;
  slider.max = 50;
  slider.value = threshold;
  slider.style.marginTop = "20px";

  const label = document.createElement("div");
  label.innerHTML = "Sensibilidad";
  label.style.marginTop = "20px";

  document.body.appendChild(label);
  document.body.appendChild(slider);

  slider.addEventListener("input", () => {
    threshold = parseInt(slider.value);
  });

  function getSmoothedDelta(delta) {
    buffer.push(delta);
    if (buffer.length > BUFFER_SIZE) buffer.shift();

    let sum = buffer.reduce((a, b) => a + b, 0);
    return sum / buffer.length;
  }

  function calibrate(x, y, z) {
    lastX = x;
    lastY = y;
    lastZ = z;
    calibrated = true;
  }

  function handleMotion(event) {
    const acc = event.accelerationIncludingGravity;
    if (!acc) return;

    let x = acc.x;
    let y = acc.y;
    let z = acc.z;

    // 📌 calibración inicial (evita falsos positivos)
    if (!calibrated) {
      calibrate(x, y, z);
      return;
    }

    // 📉 cálculo de movimiento
    let delta =
      Math.abs(x - lastX) +
      Math.abs(y - lastY) +
      Math.abs(z - lastZ);

    let smoothDelta = getSmoothedDelta(delta);

    const now = Date.now();

    // 🚫 lógica anti-spam + filtro real
    if (smoothDelta > threshold && (now - lastJumpTime > COOLDOWN)) {
      count++;
      lastJumpTime = now;
      updateCounter();
    }

    lastX = x;
    lastY = y;
    lastZ = z;
  }

  document.getElementById("start").addEventListener("click", async () => {
    calibrated = false;
    buffer = [];

    if (typeof DeviceMotionEvent.requestPermission === "function") {
      try {
        const response = await DeviceMotionEvent.requestPermission();
        if (response === "granted") {
          window.addEventListener("devicemotion", handleMotion);
        } else {
          alert("Permiso denegado");
        }
      } catch (e) {
        alert("Error al pedir permiso");
      }
    } else {
      window.addEventListener("devicemotion", handleMotion);
    }
  });

  document.getElementById("reset").addEventListener("click", () => {
    count = 0;
    updateCounter();
  });
</script>
